<!doctype html>
<html lang="en" data-theme="{{ theme or 'dark' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Echo Flow{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<aside class="sidebar">
  <div class="brand">
    <span class="logo">▮▮▯</span>
    <span class="brand-name">Echo Flow</span>
    <span class="pill">Local</span>
  </div>
  <nav class="nav">
    {% for key, label, url, _tpl in sections %}
      <a class="nav-item{% if key == active %} active{% endif %}" href="{{ url }}">
        <span class="nav-dot"></span>{{ label }}
      </a>
    {% endfor %}
  </nav>
  <div class="sidebar-footer">
    <div class="muted">v0.1 dashboard</div>
  </div>
</aside>
<header class="topbar">
  <div class="crumb">{{ active|capitalize }}</div>
  <div class="topbar-actions">
    <a class="bell" href="/notifications" title="Notifications">
      <span class="bell-glyph">🔔</span>
      <span class="bell-badge" id="bell-badge" hidden>0</span>
    </a>
  </div>
</header>
<main class="content">
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
