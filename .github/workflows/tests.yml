name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so a quick succession of pushes
# doesn't queue redundant CI.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: pure-logic suite on a minimal dependency set. All heavy
  # libs (torch, faster-whisper, sentence-transformers) are lazy-imported and
  # tests/conftest.py stubs the native shims (sounddevice, pynput, …), so the
  # suite runs green in ~1 min without the multi-hundred-MB ML stack. The
  # `pytest` job below remains the authoritative full-stack gate.
  pytest-fast:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          # Curated minimal subset (no heavy ML stack) + the test runner.
          # rich + Pillow are top-level (non-lazy) imports in src (log.py, tray.py),
          # so they're required for the suite to *collect*; the conftest stubs the
          # remaining native shims (sounddevice, pynput, pystray, ...).
          pip install flask pyyaml numpy requests rich Pillow pytest pytest-mock pytest-timeout
        shell: pwsh
      - name: Run pytest (logic suite)
        run: python -m pytest tests/ -q --tb=short
        env:
          GROQ_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        shell: pwsh

  pytest:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 dropped: torch / ctranslate2 wheels lag on the newest Python.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the full runtime stack plus the dev/test tooling. The
          # integration tests import src.main, which top-level-imports the whole
          # pipeline (faster-whisper, sounddevice, sentence-transformers,
          # pystray/Pillow, pyperclip, …), so the curated subset can't collect
          # them. This mirrors the local `scripts/run_tests.bat` environment.
          pip install -r requirements.txt -r requirements-dev.txt
        shell: pwsh

      - name: Run pytest
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          # CI must never accidentally use the real cloud APIs.
          GROQ_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        shell: pwsh
