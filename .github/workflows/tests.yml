name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 dropped: torch / ctranslate2 wheels lag on the newest Python.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the full runtime stack. The integration tests import
          # src.main, which top-level-imports the whole pipeline (faster-whisper,
          # sounddevice, sentence-transformers, pystray/Pillow, pyperclip, …), so
          # the previous curated subset could not collect them. This mirrors the
          # local `scripts/run_tests.bat` environment exactly.
          pip install -r requirements.txt
        shell: pwsh

      - name: Run pytest
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          # CI must never accidentally use the real cloud APIs.
          GROQ_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        shell: pwsh
