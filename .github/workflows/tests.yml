name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Echo Flow is local-only and pulls a lot of OS-bound packages
          # (sounddevice, faster-whisper). The test suite stubs those, so
          # we only install the lightweight subset needed to run pytest.
          pip install pytest pyyaml requests flask rich
        shell: pwsh

      - name: Run pytest
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          # CI must never accidentally use the real cloud APIs.
          GROQ_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        shell: pwsh
